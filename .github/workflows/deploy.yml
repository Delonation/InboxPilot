name: Deploy to Hostinger

# Runs on every push to main. GitHub builds the app (Composer + Vite),
# rsyncs it to Hostinger over SSH, then runs migrations and rebuilds caches.
# Fully automatic — no manual steps after the one-time setup.

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # lets you trigger a deploy manually from the Actions tab

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_mysql, mbstring, openssl, fileinfo, curl, ctype, tokenizer, bcmath
          coverage: none

      - name: Install PHP dependencies (production)
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build front-end assets
        run: |
          npm ci
          npm run build

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Upload files with rsync
        run: |
          rsync -az --delete \
            -e "ssh -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            --exclude-from='.deployignore' \
            ./ "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}"

      - name: Run migrations and rebuild caches
        run: |
          ssh -p "${{ secrets.SSH_PORT }}" \
            -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}" bash -s <<'EOF'
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            mkdir -p storage/framework/cache storage/framework/sessions storage/framework/views \
                     storage/logs storage/app/public bootstrap/cache
            chmod -R 775 storage bootstrap/cache || true
            php artisan migrate --force
            php artisan storage:link || true
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
          EOF
